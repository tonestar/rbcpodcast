name: Sync Sermons

on:
  schedule:
    # Sunday 8pm UTC = Monday 8am NZST (UTC+12) / 9am NZDT (UTC+13)
    - cron: "0 20 * * 0"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Discover new sermons
        run: node scripts/scrape-sermons.mjs --discover
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      - name: Upload new audio to R2
        run: |
          for attempt in 1 2 3; do
            echo "--- Upload attempt $attempt/3 ---"
            node scripts/scrape-sermons.mjs --upload-all
            if ! grep -q '"status": "error"' scripts/sermon-manifest.json 2>/dev/null; then
              echo "No errors remaining."
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Some entries still errored. Waiting 5 minutes before retry..."
              sleep 300
            fi
          done
          # Fail the step if errors remain after all retries
          grep -q '"status": "error"' scripts/sermon-manifest.json && exit 1 || true
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      - name: Backfill missing duration/size metadata
        run: node scripts/scrape-sermons.mjs --fix-metadata
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      - name: Generate episode markdown files
        run: node scripts/generate-episodes.mjs

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Sync Sermons workflow failed on ${new Date().toISOString().split('T')[0]}`,
              body: `The weekly sermon sync workflow failed. [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['automated']
            })

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/sermon-manifest.json src/content/episode/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: sync sermons $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push
